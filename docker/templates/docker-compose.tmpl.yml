# Docker Compose for {{AGENT_NAME}}
# Generated by: scripts/new-bot.sh
# Start via: ./start-agent.sh {{AGENT_NAME}}

services:
  {{AGENT_NAME}}:
    image: ghcr.io/ivan-fn/claudeclaw-agent:${IMAGE_TAG:-{{PINNED_TAG}}}
    container_name: {{AGENT_NAME}}
    restart: unless-stopped
    env_file:
      - .env.resolved
    environment:
      - DEVCONTAINER=true
    volumes:
      # === REPO MOUNTS (edit these per agent) ===
      # - /path/to/repo:/repos/repo-name:rw

      # === AGENT CONFIG (do not edit) ===
      - ./agents/{{AGENT_NAME}}/CLAUDE.md:/bot/CLAUDE.md:ro
      - ./agents/{{AGENT_NAME}}/settings.json:/home/agent/.claude/settings.json:ro

      # === PERSISTENT STATE ===
      - {{AGENT_NAME}}-store:/bot/store
      - {{AGENT_NAME}}-claude:/home/agent/.claude

      # === SHARED VOLUMES (uncomment if this bot needs multi-agent coordination) ===
      # - /path/to/shared/artifacts:/shared/artifacts:rw
      # - /path/to/shared/context:/shared/context:ro
      # - /path/to/shared/inbox/{{AGENT_NAME}}:/shared/inbox:ro
      # - /path/to/shared/outbox/{{AGENT_NAME}}:/shared/outbox:rw
    mem_limit: 2g
    cpus: 1.5
    shm_size: '256m'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('https://api.telegram.org').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  {{AGENT_NAME}}-store:
  {{AGENT_NAME}}-claude:
