# Example Docker Compose for an autonomous agent
# Copy this file and replace <agent-name> and paths with your own values.
# Start via: docker compose -f docker-compose.<agent-name>.yml up -d

services:
  agent:
    image: claudeclaw-agent:latest
    container_name: <agent-name>
    restart: unless-stopped
    env_file:
      - .env.resolved    # Resolved secrets (see start-agent.example.sh)
    environment:
      - DEVCONTAINER=true
    volumes:
      # ── Git repositories the agent can work on ──
      # Mount each repo individually (not the parent directory)
      - /path/to/repo1:/repos/repo1:rw
      - /path/to/repo2:/repos/repo2:rw

      # ── Persistent storage (survives container restarts) ──
      - agent-store:/bot/store           # SQLite DB, conversation history
      - agent-claude:/home/agent/.claude  # Claude CLI state

      # ── Agent config (read-only) ──
      - ./agents/<agent-name>/CLAUDE.md:/bot/CLAUDE.md:ro
      - ./agents/<agent-name>/settings.json:/home/agent/.claude/settings.json:ro

      # ── Optional: shared filesystem for multi-agent setups ──
      # - /path/to/shared/inbox/<agent-name>:/shared/inbox:ro
      # - /path/to/shared/outbox/<agent-name>:/shared/outbox:rw
    mem_limit: 2g
    cpus: 1.5
    shm_size: '256m'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('https://api.telegram.org').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agent-store:
  agent-claude:
