name: Build and Publish Docker Image

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'scripts/docker-entrypoint.sh'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.2.0)'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/claudeclaw-agent
          TAGS=""
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAGS="${IMAGE}:${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            TAGS="${IMAGE}:edge,${IMAGE}:sha-${GITHUB_SHA::7}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAGS="${IMAGE}:${{ inputs.tag }}"
          else
            TAGS="${IMAGE}:sha-${GITHUB_SHA::7}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build TypeScript
        run: |
          npm ci
          npm run build

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
